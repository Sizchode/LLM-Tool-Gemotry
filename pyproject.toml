[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "toolgeo"
version = "0.1.0"
description = "Reusable tool-geometry experiments for LLM agents"
requires-python = ">=3.10"
dependencies = ["numpy>=1.26", "PyYAML>=6.0", "rapidfuzz>=3.0"]

[project.optional-dependencies]
hf = ["torch>=2.4", "transformers>=4.48", "safetensors>=0.5"]
datasets = ["datasets>=3.0"]
probe = ["scikit-learn>=1.4"]
analysis = ["scipy>=1.12", "scikit-learn>=1.4"]
baselines = ["sentence-transformers>=3.0"]

[project.scripts]
toolgeo = "toolgeo.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
